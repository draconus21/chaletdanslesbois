name: Build LaTeX PDF

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_latex:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        language: [en, fr]
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document (${{ matrix.language }})
        uses: xu-cheng/latex-action@v3
        with:
          root_file: essential_${{ matrix.language }}.tex
          working_directory: src
          args: "-pdf -interaction=nonstopmode -halt-on-error"

      - name: Upload PDF artifact (${{ matrix.language }})
        uses: actions/upload-artifact@v4
        with:
          name: essential_${{ matrix.language }}_pdf
          path: src/essential_${{ matrix.language }}.pdf
