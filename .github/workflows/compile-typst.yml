name: Build Typst PDF

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_typst:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        language: [en, fr]
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Install Typst
        uses: typst-community/setup-typst@v3

      - name: Compile Typst document (${{ matrix.language }})
        run: typst compile src/tldr.typ src/tldr_${{ matrix.language }}.pdf --input lang=${{ matrix.language }} --root .

      - name: Upload PDF artifact (${{ matrix.language }})
        uses: actions/upload-artifact@v4
        with:
          name: tldr_${{ matrix.language }}_pdf
          path: src/tldr_${{ matrix.language }}.pdf
